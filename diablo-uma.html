<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Diablo Uma · Riobamba · Ecuador</title>
<script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#07040a;
  --deep:#0f0812;
  --crimson:#9b1c1c;
  --ember:#c8360a;
  --fire:#e8621a;
  --gold:#d4a83a;
  --gold-light:#f0cc6a;
  --cream:#f5ede0;
  --muted:#8a7560;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--black);color:var(--cream);font-family:var(--sans)}

/* CANVAS FIRE */
#fire-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* AMBIENT GLOW */
.glow-bg{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 55% at 50% 95%,rgba(155,28,28,.45) 0%,transparent 70%),
    radial-gradient(ellipse 40% 30% at 20% 40%,rgba(212,168,58,.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 40%,rgba(200,54,10,.07) 0%,transparent 60%);
}

/* HEADER */
header{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 36px 16px;
  background:linear-gradient(to bottom,rgba(7,4,10,.95) 0%,rgba(7,4,10,.6) 70%,transparent);
  pointer-events:none;
}
.header-left{display:flex;flex-direction:column;gap:3px}
.header-eyebrow{font-family:var(--sans);font-size:.65rem;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;opacity:.9}
.header-title{font-family:var(--serif);font-size:clamp(1.5rem,3.5vw,2.2rem);font-weight:700;color:var(--cream);letter-spacing:.04em;line-height:1}
.header-title em{font-style:italic;color:var(--gold)}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.header-loc{font-size:.65rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.header-flag{font-size:1.1rem}

/* STAGE */
#stage{
  position:relative;width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
}

/* VIEWER WRAP */
#viewer-wrap{
  position:relative;
  width:min(500px,78vw);
  height:min(500px,72vh);
}

/* GOLDEN RING SYSTEM */
.ring{
  position:absolute;border-radius:50%;pointer-events:none;
}
.ring-1{
  inset:-18px;
  background:conic-gradient(transparent 0deg,rgba(212,168,58,.35) 60deg,rgba(200,54,10,.5) 120deg,rgba(212,168,58,.15) 180deg,transparent 220deg,rgba(232,98,26,.3) 280deg,rgba(212,168,58,.4) 340deg,transparent 360deg);
  animation:spin1 16s linear infinite;
}
.ring-2{
  inset:-32px;
  background:conic-gradient(transparent 0deg,rgba(200,54,10,.2) 80deg,transparent 160deg,rgba(212,168,58,.18) 240deg,transparent 320deg,rgba(200,54,10,.15) 360deg);
  animation:spin1 24s linear infinite reverse;
}
.ring-dots{
  inset:-10px;
  border:none;
  animation:spin1 20s linear infinite;
}
@keyframes spin1{to{transform:rotate(360deg)}}

/* GLARE FLOOR */
.floor-glow{
  position:absolute;bottom:-60px;left:50%;transform:translateX(-50%);
  width:140%;height:80px;
  background:radial-gradient(ellipse 80% 100% at 50% 100%,rgba(200,54,10,.45),transparent);
  pointer-events:none;
  border-radius:50%;
  filter:blur(12px);
}

model-viewer{
  width:100%;height:100%;
  background:transparent;
  --poster-color:transparent;
  border-radius:50%;
  overflow:hidden;
}

/* SKETCHFAB FALLBACK */
#sf-frame{
  width:100%;height:100%;
  border:none;
  border-radius:50%;
  overflow:hidden;
  display:block;
}

/* ORBIT BUTTONS */
.orb{
  position:absolute;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  transform:translate(-50%,-50%);
  cursor:pointer;z-index:30;
  transition:filter .3s;
  -webkit-tap-highlight-color:transparent;
  outline:none;
  border:none;background:none;
  animation:orb-breathe 4s ease-in-out infinite;
}
.orb:nth-child(2){animation-delay:.8s}
.orb:nth-child(3){animation-delay:1.6s}
.orb:nth-child(4){animation-delay:2.4s}
@keyframes orb-breathe{
  0%,100%{filter:drop-shadow(0 0 8px rgba(212,168,58,.5))}
  50%{filter:drop-shadow(0 0 22px rgba(200,54,10,.7))}
}
.orb:hover,.orb:focus{filter:drop-shadow(0 0 28px rgba(212,168,58,.9))!important}

.orb-disc{
  width:58px;height:58px;border-radius:50%;
  background:rgba(7,4,10,.82);
  border:1px solid rgba(212,168,58,.55);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;
  position:relative;
  overflow:hidden;
  transition:transform .25s,border-color .25s,background .25s;
  backdrop-filter:blur(16px);
}
.orb-disc::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(212,168,58,.18),transparent 60%);
}
.orb:hover .orb-disc,.orb:focus .orb-disc{
  transform:scale(1.15);
  border-color:var(--fire);
  background:rgba(155,28,28,.7);
}
.orb-label{
  font-family:var(--sans);
  font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold-light);text-align:center;max-width:80px;
  text-shadow:0 1px 8px rgba(0,0,0,.9);line-height:1.3;
}

/* POSITIONS — relative to viewer-wrap */
#b-quien {top:7%;  left:82%}   /* top-right */
#b-hist  {top:68%; left:90%}   /* mid-right */
#b-trad  {top:72%; left:10%}   /* mid-left  */
#b-foto  {top:8%;  left:18%}   /* top-left  */

@media(max-width:500px){
  #b-quien{top:5%;left:80%}
  #b-hist {top:70%;left:86%}
  #b-trad {top:72%;left:14%}
  #b-foto {top:6%; left:20%}
  .orb-disc{width:46px;height:46px;font-size:1.2rem}
  .orb-label{font-size:.55rem}
}

/* AR PILL */
#ar-pill{
  position:fixed;bottom:28px;right:28px;z-index:50;
  display:flex;align-items:center;gap:9px;
  padding:10px 20px;
  border-radius:999px;
  background:rgba(7,4,10,.85);
  border:1px solid rgba(212,168,58,.4);
  backdrop-filter:blur(16px);
  font-family:var(--sans);font-size:.7rem;letter-spacing:.15em;
  color:var(--gold);text-transform:uppercase;
  cursor:pointer;transition:border-color .2s,background .2s;
}
#ar-pill:hover{background:rgba(155,28,28,.7);border-color:var(--fire)}
#ar-pill .ar-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* FOOTER STRIP */
footer{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  padding:14px 36px;
  background:linear-gradient(to top,rgba(7,4,10,.9) 60%,transparent);
  display:flex;align-items:center;justify-content:center;gap:6px;
  pointer-events:none;
}
.footer-text{font-size:.6rem;letter-spacing:.25em;color:var(--muted);text-transform:uppercase}
.footer-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:.6}

/* MODAL SYSTEM */
#overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(4,2,8,.88);
  backdrop-filter:blur(18px) saturate(.8);
  display:none;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;transition:opacity .35s;
}
#overlay.visible{display:flex}
#overlay.open{opacity:1}

.modal-box{
  position:relative;
  width:min(560px,100%);
  max-height:90vh;overflow-y:auto;
  background:rgba(15,8,18,.95);
  border:1px solid rgba(212,168,58,.25);
  border-radius:24px;
  padding:44px 40px 36px;
  transform:translateY(20px) scale(.97);
  transition:transform .35s cubic-bezier(.16,1,.3,1);
  scrollbar-width:thin;scrollbar-color:rgba(212,168,58,.3) transparent;
}
#overlay.open .modal-box{transform:translateY(0) scale(1)}

/* gold top bar */
.modal-box::before{
  content:'';position:absolute;top:0;left:40px;right:40px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.modal-close{
  position:absolute;top:16px;right:20px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(212,168,58,.1);border:1px solid rgba(212,168,58,.25);
  color:var(--gold);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;font-family:var(--sans);
}
.modal-close:hover{background:rgba(155,28,28,.5)}

.modal-emoji{font-size:2.4rem;display:block;margin-bottom:12px}
.modal-tag{
  display:inline-block;margin-bottom:10px;
  font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--gold);font-family:var(--sans);
  border-bottom:1px solid rgba(212,168,58,.35);padding-bottom:4px;
}
.modal-title{
  font-family:var(--serif);font-size:clamp(1.5rem,4vw,2rem);
  font-weight:400;color:var(--cream);margin-bottom:20px;line-height:1.15;
}
.modal-title em{font-style:italic;color:var(--gold)}
.modal-body p{
  font-family:var(--sans);font-size:.9rem;line-height:1.85;
  color:rgba(245,237,224,.75);margin-bottom:14px;
}
.modal-body strong{color:var(--gold-light);font-weight:500}
.modal-body .highlight{
  margin:20px 0;padding:16px 20px;
  border-left:2px solid var(--gold);
  background:rgba(212,168,58,.06);
  border-radius:0 12px 12px 0;
}
.modal-body .highlight p{margin:0;font-style:italic;color:rgba(245,237,224,.85)}

/* CAMERA */
.cam-wrap{
  position:relative;border-radius:16px;overflow:hidden;
  background:#000;margin-top:16px;
}
#vid{width:100%;display:block;border-radius:16px}
#cnv{display:none}
#preview{width:100%;border-radius:16px;display:none;margin-top:12px}
.btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.pill{
  flex:1;min-width:120px;padding:10px 20px;border-radius:999px;
  border:1px solid rgba(212,168,58,.45);background:transparent;
  color:var(--gold);font-family:var(--sans);font-size:.72rem;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
  transition:background .2s,border-color .2s;
}
.pill:hover{background:rgba(200,54,10,.45);border-color:var(--fire);color:var(--cream)}
.pill.primary{background:linear-gradient(135deg,#9b1c1c,#c8360a);border-color:transparent;color:#fff}
.pill.primary:hover{background:linear-gradient(135deg,#7a1414,#a82c08)}
.cam-note{font-size:.7rem;color:var(--muted);text-align:center;margin-top:10px;line-height:1.6}
</style>
</head>
<body>

<canvas id="fire-canvas"></canvas>
<div class="glow-bg"></div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <span class="header-eyebrow">Patrimonio Cultural del Ecuador</span>
    <h1 class="header-title">Diablo <em>Uma</em></h1>
  </div>
  <div class="header-right">
    <span class="header-flag">🇪🇨</span>
    <span class="header-loc">Riobamba · Chimborazo</span>
  </div>
</header>

<!-- STAGE -->
<div id="stage">
  <div id="viewer-wrap">

    <!-- Rings -->
    <div class="ring ring-2"></div>
    <div class="ring ring-1"></div>
    <div class="floor-glow"></div>

    <!-- 3D / Sketchfab embed -->
    <model-viewer id="mv"
      src="models/diablo.glb"
      alt="Diablo de Lata – Pase del Niño Riobamba"
      shadow-intensity="1.4" shadow-softness="1"
      environment-image="neutral" exposure="1.2"
      auto-rotate auto-rotate-delay="0"
      rotation-per-second="15deg"
      camera-controls
      ar ar-modes="webxr scene-viewer quick-look"
      ar-scale="auto"
      ar-placement="floor"
      style="--progress-bar-color:#d4a83a;--progress-mask:transparent"
    >
      <button slot="ar-button" id="ar-pill">
        <span class="ar-dot"></span>
        Ver en Realidad Aumentada
      </button>
    </model-viewer>

    <!-- Orbit buttons -->
    <button class="orb" id="b-quien" onclick="show('quien')" aria-label="¿Quién soy?">
      <div class="orb-disc">👁️</div>
      <span class="orb-label">¿Quién<br>soy?</span>
    </button>
    <button class="orb" id="b-hist" onclick="show('historia')" aria-label="Mi historia">
      <div class="orb-disc">📖</div>
      <span class="orb-label">Mi<br>historia</span>
    </button>
    <button class="orb" id="b-trad" onclick="show('tradicion')" aria-label="Tradición">
      <div class="orb-disc">🏛️</div>
      <span class="orb-label">Tradi&shy;ción</span>
    </button>
    <button class="orb" id="b-foto" onclick="show('foto')" aria-label="Tomar foto">
      <div class="orb-disc">📸</div>
      <span class="orb-label">Tomar<br>foto</span>
    </button>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <span class="footer-text">Pase del Niño</span>
  <span class="footer-dot"></span>
  <span class="footer-text">Riobamba 2024</span>
  <span class="footer-dot"></span>
  <span class="footer-text">Patrimonio Inmaterial</span>
</footer>

<!-- MODAL -->
<div id="overlay" onclick="bgClose(event)">
  <div class="modal-box" role="dialog" aria-modal="true" id="mbox">
    <button class="modal-close" onclick="hide()" aria-label="Cerrar">✕</button>
    <span class="modal-emoji" id="memoji"></span>
    <span class="modal-tag" id="mtag"></span>
    <h2 class="modal-title" id="mtitle"></h2>
    <div class="modal-body" id="mbody"></div>
  </div>
</div>

<script>
/* ──────────────────────────────────────────────────────────
   FIRE PARTICLES
   ────────────────────────────────────────────────────────── */
(()=>{
  const c=document.getElementById('fire-canvas');
  const g=c.getContext('2d');
  let W,H;
  const resize=()=>{c.width=W=innerWidth;c.height=H=innerHeight};
  resize();addEventListener('resize',resize);

  const COLORS=['#d4a83a','#e8621a','#c8360a','#f0cc6a','#9b1c1c'];
  const N=70;
  const ps=Array.from({length:N},()=>({
    x:Math.random(),bx:Math.random()*.3-.15,
    y:Math.random(),
    r:Math.random()*2.5+.8,
    sp:Math.random()*.006+.002,
    op:0,phase:Math.random()*Math.PI*2,
    col:COLORS[Math.floor(Math.random()*COLORS.length)]
  }));

  let t=0;
  const draw=()=>{
    g.clearRect(0,0,W,H);
    t+=.016;
    ps.forEach(p=>{
      p.y-=p.sp;
      if(p.y<0){p.y=1;p.x=Math.random();p.phase=Math.random()*Math.PI*2}
      const life=p.y>0.85?0:(p.y>0.75?(1-p.y)*10:1);
      const wx=p.x*W+Math.sin(t*1.2+p.phase)*22;
      const wy=p.y*H;
      g.save();
      g.globalAlpha=life*.55;
      g.fillStyle=p.col;
      g.shadowBlur=0;
      g.beginPath();
      g.arc(wx,wy,p.r*(1+life*.3),0,Math.PI*2);
      g.fill();
      g.restore();
    });
    requestAnimationFrame(draw);
  };
  draw();
})();

/* ──────────────────────────────────────────────────────────
   MODAL CONTENT
   ────────────────────────────────────────────────────────── */
const DATA={
  quien:{
    emoji:'👁️',tag:'Identidad',
    title:'¿Quién soy?',
    html:`
      <p>Soy el <strong>Diablo Uma</strong>. En kichwa, mi nombre significa <em>"Cabeza de Diablo"</em> — uma es cabeza, y llevo en mi máscara toda la fuerza de los Andes.</p>
      <div class="highlight"><p>"No soy el mal. Soy el guardián de la fiesta, el que aleja lo que daña y protege a quienes celebran."</p></div>
      <p>Mi máscara de lata pintada a mano, mis cuernos imponentes y mi traje multicolor me hacen inconfundible. Danzo entre la multitud con energía desbordante, generando <strong>asombro, risa y devoción</strong> a partes iguales.</p>
      <p>Aunque llevo la imagen del "diablo" de la tradición colonial, los pueblos andinos transformaron esa figura en símbolo de celebración y resistencia. Soy prueba de que la cultura puede reinterpretar y vencer cualquier imposición.</p>
    `
  },
  historia:{
    emoji:'📖',tag:'Historia',
    title:'Mi historia',
    html:`
      <p>Mis raíces se hunden en la era colonial, cuando los pueblos kichwa de los Andes fusionaron su cosmovisión ancestral con los símbolos impuestos por la evangelización española.</p>
      <p>Los misioneros usaron la figura del diablo para infundir temor. Los pueblos indígenas respondieron apropiándose de ella: la vistieron con colores, le pusieron a bailar y la convirtieron en <strong>celebración</strong>. Fue un acto silencioso y poderoso de resistencia cultural.</p>
      <div class="highlight"><p>"Tomaron nuestra imagen del miedo y la hicieron danzar. Así nació el Diablo Uma."</p></div>
      <p>Con el paso de los siglos, la artesanía evolucionó. La máscara fue primero de madera tallada. En el siglo XX, los artesanos de Riobamba comenzaron a trabajar el <strong>hojalate</strong> — una lámina de acero fina — creando piezas más ligeras, más coloridas y más elaboradas.</p>
      <p>Hoy la elaboración de la máscara de lata es un arte que pasa de padres a hijos, declarado <strong>Patrimonio Cultural Inmaterial del Ecuador</strong> por el Instituto Nacional de Patrimonio Cultural.</p>
    `
  },
  tradicion:{
    emoji:'🏛️',tag:'Riobamba',
    title:'Tradición y fiesta',
    html:`
      <p>En Riobamba, capital de Chimborazo, mi presencia es el corazón del <strong>Pase del Niño</strong> — una de las festividades más importantes de toda la Sierra ecuatoriana, celebrada entre diciembre y enero.</p>
      <p>Las calles de la ciudad se transforman: comparsas, bandas de pueblo, caballos adornados con flores y castillos de fuegos artificiales crean un escenario único. Yo encabezo los desfiles, marcando el ritmo con mis pasos frenéticos.</p>
      <div class="highlight"><p>"La fiesta mezcla la devoción cristiana al Niño Jesús con rituales andinos que vienen de mucho antes de la conquista. Esa mezcla es Riobamba."</p></div>
      <p>Las máscaras de Diablo Uma fabricadas en Riobamba son reconocidas en todo el país por su <strong>calidad artesanal</strong>. Cada pieza es pintada a mano con motivos geométricos, serpientes bicéfalas, soles, estrellas y figuras de la cosmovisión andina — cada trazo tiene un significado.</p>
      <p>Visitar el taller de un artesano mascarero en Riobamba es una experiencia irrepetible. Muchos talleres están en el barrio histórico y reciben visitantes durante todo el año.</p>
    `
  },
  foto:{
    emoji:'📸',tag:'Experiencia',
    title:'Tu foto con el Diablo Uma',
    html:`<div id="camblock"></div>`
  }
};

/* ──────────────────────────────────────────────────────────
   MODAL OPEN / CLOSE
   ────────────────────────────────────────────────────────── */
let camStream=null;

function show(k){
  const d=DATA[k];
  document.getElementById('memoji').textContent=d.emoji;
  document.getElementById('mtag').textContent=d.tag;
  document.getElementById('mtitle').innerHTML=d.title;
  document.getElementById('mbody').innerHTML=d.html;
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('open')));
  if(k==='foto') startCam();
}
function hide(){
  const ov=document.getElementById('overlay');
  ov.classList.remove('open');
  setTimeout(()=>{ov.style.display='none';stopCam()},350);
}
function bgClose(e){if(e.target===document.getElementById('overlay'))hide()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hide()});

/* ──────────────────────────────────────────────────────────
   CAMERA
   ────────────────────────────────────────────────────────── */
async function startCam(){
  const el=document.getElementById('camblock');
  el.innerHTML=`
    <div class="cam-wrap"><video id="vid" autoplay playsinline muted></video><canvas id="cnv"></canvas></div>
    <img id="preview" alt="Tu recuerdo con el Diablo Uma"/>
    <div class="btn-row">
      <button class="pill primary" id="snap-btn" onclick="snap()">📷 Capturar</button>
      <button class="pill" id="dl-btn" style="display:none" onclick="dlPhoto()">⬇ Descargar</button>
      <button class="pill" id="re-btn"  style="display:none" onclick="retryCam()">↩ Nueva foto</button>
    </div>
    <p class="cam-note">La foto se guarda solo en tu dispositivo · No se sube a ningún servidor</p>
  `;
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    document.getElementById('vid').srcObject=camStream;
  }catch{
    document.getElementById('camblock').innerHTML=`<p style="color:var(--gold);text-align:center;padding:24px 0;font-family:var(--sans);font-size:.85rem">No se pudo acceder a la cámara.<br><span style="color:var(--muted);font-size:.75rem">Verifica los permisos del navegador.</span></p>`;
  }
}
function stopCam(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null}}

function snap(){
  const v=document.getElementById('vid'),c=document.getElementById('cnv'),p=document.getElementById('preview');
  if(!v||!v.srcObject)return;
  c.width=v.videoWidth||640;c.height=v.videoHeight||480;
  const ctx=c.getContext('2d');
  ctx.translate(c.width,0);ctx.scale(-1,1);
  ctx.drawImage(v,0,0);
  ctx.setTransform(1,0,0,1,0,0);
  const bh=48;
  ctx.fillStyle='rgba(7,4,10,.72)';
  ctx.fillRect(0,c.height-bh,c.width,bh);
  ctx.font='bold 13px "Playfair Display",Georgia,serif';
  ctx.fillStyle='#d4a83a';ctx.textAlign='center';
  ctx.fillText('Diablo Uma  ·  Pase del Niño  ·  Riobamba, Ecuador',c.width/2,c.height-bh/2+5);
  p.src=c.toDataURL('image/jpeg',.92);
  p.style.display='block';
  document.getElementById('snap-btn').style.display='none';
  document.getElementById('dl-btn').style.display='flex';
  document.getElementById('re-btn').style.display='flex';
}
function dlPhoto(){
  const a=document.createElement('a');
  a.download='diablo-uma-riobamba.jpg';
  a.href=document.getElementById('cnv').toDataURL('image/jpeg',.92);
  a.click();
}
function retryCam(){
  document.getElementById('preview').style.display='none';
  document.getElementById('snap-btn').style.display='flex';
  document.getElementById('dl-btn').style.display='none';
  document.getElementById('re-btn').style.display='none';
}
</script>
</body>
</html>
